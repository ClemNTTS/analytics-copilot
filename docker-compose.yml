services:
  db:
    image: postgres:15-alpine
    container_name: analytics_demo_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-analytics_demo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-analytics_demo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics_copilot_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://llm_user:llm_access_only@db:5432/analytics_demo"
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.mistral.ai/v1}
      AI_MODEL: ${AI_MODEL:-mistral-large-latest}
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
